# Alembic configuration file.
# Run migrations with: alembic upgrade head
# Generate a new migration: alembic revision --autogenerate -m "description"

[alembic]
# Path to the migration scripts, relative to this file (repo root).
script_location = backend/alembic

# File naming convention: revision_slug.py
file_template = %%(rev)s_%%(slug)s

# Add the repo root to sys.path so backend.* imports resolve correctly.
prepend_sys_path = .

# Disable timezone-naive datetime warnings from SQLAlchemy.
timezone = UTC

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
