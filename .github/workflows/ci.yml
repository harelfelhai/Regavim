name: CI / CD

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # ── Backend tests ─────────────────────────────────────────────────────────────
  test-backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r requirements-dev.txt

      - name: Run pytest
        run: pytest --tb=short

  # ── Frontend tests ────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run vitest
        run: npm test -- --run
        working-directory: frontend

  # ── Deploy to Render (main branch only) ───────────────────────────────────────
  deploy:
    name: Deploy backend (Render)
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      # Render also auto-deploys via its GitHub app, but this explicit step
      # ensures deploy only fires after all tests pass.
      # To enable: add RENDER_DEPLOY_HOOK_URL as a repository secret in GitHub.
      - name: Trigger Render deploy hook
        if: ${{ vars.RENDER_DEPLOY_HOOK_URL != '' || secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          curl --silent --show-error --fail \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
